name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore PluginList.sln

      - name: Build
        run: dotnet build $Env:GITHUB_WORKSPACE\PluginList.sln /p:Configuration=Release /p:DefineConstants=XL_NOAUTOUPDATE

      - name: Package
        uses: vimtor/action-zip@v1
        with:
          files: PluginList\bin\x64\Release\PluginList.dll PluginList\bin\x64\Release\PluginList.json PluginList\bin\x64\Release\PluginList.pdb PluginList\bin\x64\Release\icon.png PluginList\bin\x64\Release\README.md
          dest: PluginList\bin\Package\PluginList.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: PluginList\bin\Package\PluginList.zip
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
